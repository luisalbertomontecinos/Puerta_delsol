<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador 3D - Puerta Del Sol</title>
    <style>
        body { margin: 0; overflow: hidden; }
    </style>
</head>
<body>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color("#111111"); 
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 5, 8); 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; 
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 0.5, 0);


        // luz: AmbientLight 
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.2);
        scene.add(ambientLight);

        // luz: DirectionalLight 
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(4, 5, 3); 
        dirLight.castShadow = true;     
        scene.add(dirLight);

        // luz: HemisphereLight 
        const hemiLight = new THREE.HemisphereLight(0x4466aa, 0x223344, 0.5);
        scene.add(hemiLight);

        // luz 4: PointLight (NUEVA - Luz omnidireccional cálida tipo lámpara cercana)
        const pointLight = new THREE.PointLight(0xffaa00, 15, 10);
        pointLight.position.set(-2, 1.5, 2);
        scene.add(pointLight);
        
        // (Opcional) Helper para ver dónde está el PointLight
        // const pointLightHelper = new THREE.PointLightHelper(pointLight, 0.2);
        // scene.add(pointLightHelper);

        // luz 5: SpotLight
        const spotLight = new THREE.SpotLight(0xffffff, 20);
        spotLight.position.set(0, 6, 4);
        spotLight.angle = Math.PI / 6; 
        spotLight.penumbra = 0.5;      
        spotLight.castShadow = true;
        scene.add(spotLight);

        // MATERIAL LAMBERTIANO (piso)
        
        const floorGeo = new THREE.PlaneGeometry(15, 15);
        // MeshLambertMaterial: Ideal para superficies mate que no reflejan luz especular
        const floorMat = new THREE.MeshLambertMaterial({ color: 0x555555 }); 
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2; 
        floor.receiveShadow = true; 
        scene.add(floor);

        const grid = new THREE.GridHelper(15, 15, 0x000000, 0x000000);
        grid.material.opacity = 0.2;
        grid.material.transparent = true;
        scene.add(grid);

        // MODELO Y MATERIAL PHONG

        const loader = new GLTFLoader();
        const rutaModelo = './puerta.glb'; 

        loader.load(
            rutaModelo,
            function (gltf) {
                const model = gltf.scene;
                
                model.rotation.x = 0.6;              
                model.rotation.y = Math.PI / 2;      
                model.rotation.z = -10;              
                
                model.position.set(0, 0.02, 0); 
                
                // Recorrer el modelo para el MeshPhongMaterial
                model.traverse((node) => {
                    if (node.isMesh) {
                        node.castShadow = true;
                        node.receiveShadow = true;
            
                        const oldMat = node.material;
                        
                        // MeshPhongMaterial: calcula la luz por pixel y permite brillos 
                        node.material = new THREE.MeshPhongMaterial({
                            color: oldMat.color || 0xcccccc,
                            map: oldMat.map || null, 
                            shininess: 60,           
                            specular: 0x444444       
                        });
                    }
                });

                scene.add(model);
                console.log("Modelo cargado con éxito y material Phong aplicado.");
            },
            function (xhr) {
                console.log((xhr.loaded / xhr.total * 100) + '% cargado');
            },
            function (error) {
                console.error('Error al cargar el modelo:', error);
            }
        );

        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

    </script>
</body>
</html>
